# =================================================================
# FILE 2: k8s/ui-deployment.yaml
# =================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  namespace: three-tier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basic3tier-ui
  template:
    metadata:
      labels:
        app: basic3tier-ui
    spec:
      containers:
      - name: ui-container
        image: sribeeram/basic3tier-ui:latest
        ports:
        - containerPort: 80
        env:
        - name: API_URL
          value: "http://k8s-threetie-uiingres-5cb5d86086-766427848.us-east-1.elb.amazonaws.com/"
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: three-tier
spec:
  selector:
    app: basic3tier-ui
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP