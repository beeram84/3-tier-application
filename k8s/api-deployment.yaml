# =================================================================
# FILE 1: k8s/api-deployment.yaml
# =================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: three-tier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basic3tier-api
  template:
    metadata:
      labels:
        app: basic3tier-api
    spec:
      containers:
      - name: api-container
        image: sribeeram/basic3tier-api:latest
        ports:
        - containerPort: 80
        env:
        - name: ConnectionStrings__Basic3Tier
          value: "Host=postgres-service;Port=5432;Database=basic3tier;Username=postgres;Password=yourpassword"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: three-tier
spec:
  selector:
    app: basic3tier-api
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
