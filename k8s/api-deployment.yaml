  # =================================================================
# STEP 1: Create the secret first by running this command:
#
# kubectl create secret generic api-db-secret \
#   --from-literal=connection-string="Host=postgres-service;Port=5432;Database=basic3tier;Username=postgres;Password=YOUR_REAL_PASSWORD" \
#   -n three-tier
#
# Replace YOUR_REAL_PASSWORD with your actual Postgres password.
# =================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: three-tier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basic3tier-api
  template:
    metadata:
      labels:
        app: basic3tier-api
    spec:
      containers:
      - name: api-container
        image: sribeeram/basic3tier-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: ConnectionStrings__Basic3Tier
          valueFrom:
            secretKeyRef:
              name: api-db-secret
              key: connection-string
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: three-tier
spec:
  selector:
    app: basic3tier-api
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
